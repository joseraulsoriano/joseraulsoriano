<svg xmlns="http://www.w3.org/2000/svg" width="200" height="250" viewBox="0 0 200 250" fill="none" role="img" aria-label="Fundador de RTC Solutions">
  <defs>
    <linearGradient id="rc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5484D"/>
      <stop offset="50%" stop-color="#7C6CF0"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7C6CF0" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ribbons -->
  <path d="M72,132 L96,150 L96,242 L84,230 L72,242 Z" fill="#E5484D"/>
  <path d="M128,132 L104,150 L104,242 L116,230 L128,242 Z" fill="#22D3EE"/>

  <!-- medal body -->
  <g filter="url(#glow)">
    <circle cx="100" cy="82" r="70" fill="#0D1117" stroke="url(#rc)" stroke-width="5"/>
  </g>

  <!-- rotating dashed inner ring -->
  <circle cx="100" cy="82" r="58" fill="none" stroke="#7C6CF0" stroke-width="1.4" stroke-dasharray="3 6" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 100 82" to="360 100 82" dur="22s" repeatCount="indefinite"/>
  </circle>

  <!-- star -->
  <polygon points="100,52 107.05,72.29 128.53,72.73 111.41,85.71 117.63,106.27 100,94 82.37,106.27 88.59,85.71 71.47,72.73 92.95,72.29" fill="url(#rc)"/>

  <!-- labels -->
  <text x="100" y="128" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="3" fill="#E6EDF3">FUNDADOR</text>
  <text x="100" y="142" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="6.5" font-weight="600" letter-spacing="2.5" fill="#22D3EE">RTC SOLUTIONS</text>
</svg>
